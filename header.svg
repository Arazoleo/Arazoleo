<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#080d1c"/>
    <stop offset="60%" stop-color="#0d0d2b"/>
    <stop offset="100%" stop-color="#0a0519"/>
  </linearGradient>
  <radialGradient id="glowLeft" cx="25%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#080d1c" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowRight" cx="80%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#080d1c" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowText" x="-30%" y="-50%" width="160%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    @keyframes nodeA {
      0%,100%{opacity:.35;} 50%{opacity:1;}
    }
    @keyframes nodeB {
      0%,100%{opacity:.25;} 50%{opacity:.85;}
    }
    @keyframes nodeC {
      0%,100%{opacity:.3;} 50%{opacity:.9;}
    }
    @keyframes nodeD {
      0%,100%{opacity:.4;} 50%{opacity:1;}
    }
    @keyframes connFlow {
      0%{stroke-dashoffset:24; stroke-opacity:.08;}
      50%{stroke-opacity:.35;}
      100%{stroke-dashoffset:0; stroke-opacity:.08;}
    }
    @keyframes connFlow2 {
      0%{stroke-dashoffset:24; stroke-opacity:.06;}
      50%{stroke-opacity:.25;}
      100%{stroke-dashoffset:0; stroke-opacity:.06;}
    }
    @keyframes fadeSlideIn {
      from{opacity:0; transform:translateY(8px);}
      to{opacity:1; transform:translateY(0);}
    }
    @keyframes titleGlow {
      0%,100%{filter:url(#glowText); opacity:.9;}
      50%{opacity:1;}
    }
    @keyframes floatMath {
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-6px);}
    }
    @keyframes scanline {
      0%{transform:translateY(-300px);}
      100%{transform:translateY(300px);}
    }
    .n1{animation:nodeA 2.4s ease-in-out infinite;}
    .n2{animation:nodeB 2.8s ease-in-out infinite .4s;}
    .n3{animation:nodeC 2.1s ease-in-out infinite .7s;}
    .n4{animation:nodeD 3.1s ease-in-out infinite .2s;}
    .cf1{animation:connFlow 3.5s linear infinite;}
    .cf2{animation:connFlow2 4.2s linear infinite .8s;}
    .cf3{animation:connFlow 5.1s linear infinite 1.6s;}
    .title{animation:fadeSlideIn .8s ease-out forwards;}
    .sub1{animation:fadeSlideIn .8s ease-out .25s forwards; opacity:0;}
    .sub2{animation:fadeSlideIn .8s ease-out .5s forwards; opacity:0;}
    .tagrow{animation:fadeSlideIn .8s ease-out .75s forwards; opacity:0;}
    .math1{animation:floatMath 4s ease-in-out infinite;}
    .math2{animation:floatMath 5s ease-in-out infinite 1s;}
    .math3{animation:floatMath 3.5s ease-in-out infinite 2s;}
  </style>
</defs>
